{% extends "base/layout.html" %}
{% block title %}Profile | MiniTweet{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10">

  <div class="card p-8 animate-fade-up">

    <h2 class="text-2xl font-display font-700 gradient-text mb-4">
      Your Profile
    </h2>

    <div class="space-y-3 text-sm">
      <p><span class="font-semibold">Username:</span> {{ user.username }}</p>
      <p><span class="font-semibold">Email:</span> {{ user.email }}</p>
      <p><span class="font-semibold">Joined:</span> {{ user.date_joined }}</p>
    </div>

    <div class="mt-6 flex gap-3">
      <a href="{% url 'home' %}" class="btn btn-secondary">Back</a>

      <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
          Logout
        </button>
      </form>
    </div>

  </div>

</div>
{% endblock %}
